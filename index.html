    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "ExamCraft AI",
      "description": "AI-powered computer-based test (CBT) exam practice platform with question generation, timed exams, strict marking, and unit progression.",
      "url": "https://examcraft-ai.netlify.app/",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Web Browser",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "AI-powered question generation",
        "Timed exam mode",
        "Strict answer evaluation",
        "Unit progression system",
        "Flashcard study mode",
        "Performance analytics",
        "Dark mode support",
        "Offline-capable (localStorage)"
      ],
      "screenshot": "./og-image.png",
      "softwareVersion": "0.1.0"
    }
    </script>

    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>

    <div id="root"></div>

    </noscript>
